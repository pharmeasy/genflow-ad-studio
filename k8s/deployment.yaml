---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ configs.app.identifier }}-config
  namespace: {{ namespace }}
  labels:
    k8s-app: {{ configs.app.identifier }}
data:
{% for key, value in configs.app.env.items() %}
  {{ key }}: "{{ value }}"
{% endfor %}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ configs.app.identifier }}-output
  namespace: {{ namespace }}
  labels:
    k8s-app: {{ configs.app.identifier }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ configs.app.storage.storage_class }}
  resources:
    requests:
      storage: {{ configs.app.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ configs.app.identifier }}
  namespace: {{ namespace }}
  labels:
    k8s-app: {{ configs.app.identifier }}
spec:
  progressDeadlineSeconds: 300
  revisionHistoryLimit: {{ revision_history_limit }}
  selector:
    matchLabels:
      k8s-app: {{ configs.app.identifier }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0%
      maxSurge: 30%
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
      labels:
        k8s-app: {{ configs.app.identifier }}
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: {{ configs.app.identifier }}-sa
      containers:
        - name: {{ container_identifier }}
          image: {{ image_repo }}:{{ tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ configs.app.identifier }}-config
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/secrets/gcp/key.json"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
              scheme: HTTP
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60
          resources:
            limits:
              cpu: {{ configs.app.resources.limits.cpu }}
              memory: {{ configs.app.resources.limits.memory }}
            requests:
              cpu: {{ configs.app.resources.requests.cpu }}
              memory: {{ configs.app.resources.requests.memory }}
          volumeMounts:
            - name: output-data
              mountPath: /app/output
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
      volumes:
        - name: output-data
          persistentVolumeClaim:
            claimName: {{ configs.app.identifier }}-output
        - name: gcp-credentials
          secret:
            secretName: {{ configs.app.identifier }}-gcp-key
---
apiVersion: v1
kind: Service
metadata:
  name: {{ configs.app.identifier }}
  namespace: {{ namespace }}
  labels:
    k8s-svc: {{ configs.app.identifier }}
spec:
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    k8s-app: {{ configs.app.identifier }}
  type: ClusterIP
---
apiVersion: getambassador.io/v2
kind: Mapping
metadata:
  name: {{ configs.app.identifier }}
  namespace: {{ namespace }}
spec:
  bypass_auth: true
  host: {{ configs.app.fqdn }}
  host_regex: true
  prefix: /
  service: {{ configs.app.identifier }}.{{ namespace }}:80
  timeout_ms: 120000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ configs.app.identifier }}
  namespace: {{ namespace }}
spec:
  scaleTargetRef:
    kind: Deployment
    name: {{ configs.app.identifier }}
    apiVersion: apps/v1
  minReplicas: {{ configs.app.min_replicas }}
  maxReplicas: {{ configs.app.max_replicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ configs.app.hpa.cpu_average_utilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ configs.app.hpa.memory_average_utilization }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
        - type: Percent
          value: 10
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
        - type: Percent
          value: 30
          periodSeconds: 15
      selectPolicy: Max
