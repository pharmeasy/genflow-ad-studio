---
apiVersion: v1
kind: Namespace
metadata:
  name: staging-genflow
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-genflow-ad-studio-config
  namespace: staging-genflow
  labels:
    k8s-app: staging-genflow-ad-studio
data:
  GCS_BUCKET_NAME: "genflow-staging-output"
  GEMINI_FLASH_MODEL: "gemini-3-flash-preview"
  GEMINI_MODEL: "gemini-3-flash-preview"
  IMAGE_MODEL: "gemini-3-pro-image-preview"
  MAX_CONCURRENT_SCENES: "3"
  MAX_REGEN_ATTEMPTS: "3"
  MAX_VIDEO_VARIANTS: "4"
  OUTPUT_DIR: "/app/output"
  PROJECT_ID: "your-gcp-project-id"
  REGION: "us-central1"
  SCRIPT_DEFAULT_SCENE_COUNT: "3"
  SEEDANCE_API_BASE_URL: "https://api.byteplusapi.com"
  SEEDANCE_MODELS: >-
    [{"id":"seedance-2-0-260128","label":"Seedance 2.0","description":"Standard — Best quality"},{"id":"seedance-2-0-fast-260128","label":"Seedance 2.0 Fast","description":"Faster generation"}]
  STORYBOARD_QC_THRESHOLD: "60"
  VEO_MODELS: >-
    [{"id":"veo-3.1-generate-preview","label":"Veo 3.1 Preview","description":"Standard — Best quality"},{"id":"veo-3.1-fast-generate-preview","label":"Veo 3.1 Fast Preview","description":"Faster generation"}]
  VIDEO_QC_THRESHOLD: "6"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: staging-genflow-ad-studio-output
  namespace: staging-genflow
  labels:
    k8s-app: staging-genflow-ad-studio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: staging-genflow-ad-studio
  namespace: staging-genflow
  labels:
    k8s-app: staging-genflow-ad-studio
spec:
  progressDeadlineSeconds: 300
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      k8s-app: staging-genflow-ad-studio
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0%
      maxSurge: 30%
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
      labels:
        k8s-app: staging-genflow-ad-studio
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: staging-genflow-ad-studio-sa
      containers:
        - name: staging-genflow-ad-studio
          image: 127603365779.dkr.ecr.ap-south-1.amazonaws.com/genflow-ad-studio:staging
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: staging-genflow-ad-studio-config
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/secrets/gcp/key.json"
            - name: SEEDANCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-genflow-ad-studio-gcp-key
                  key: seedance-api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
              scheme: HTTP
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: output-data
              mountPath: /app/output
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
      volumes:
        - name: output-data
          persistentVolumeClaim:
            claimName: staging-genflow-ad-studio-output
        - name: gcp-credentials
          secret:
            secretName: staging-genflow-ad-studio-gcp-key
---
apiVersion: v1
kind: Service
metadata:
  name: staging-genflow-ad-studio
  namespace: staging-genflow
  labels:
    k8s-svc: staging-genflow-ad-studio
spec:
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    k8s-app: staging-genflow-ad-studio
  type: ClusterIP
---
apiVersion: getambassador.io/v2
kind: Mapping
metadata:
  name: staging-genflow-ad-studio
  namespace: staging-genflow
spec:
  bypass_auth: true
  host: staging\.genflow\.net
  host_regex: true
  prefix: /
  service: staging-genflow-ad-studio.staging-genflow:80
  timeout_ms: 120000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: staging-genflow-ad-studio
  namespace: staging-genflow
spec:
  scaleTargetRef:
    kind: Deployment
    name: staging-genflow-ad-studio
    apiVersion: apps/v1
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 85
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
        - type: Percent
          value: 10
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
        - type: Percent
          value: 30
          periodSeconds: 15
      selectPolicy: Max
