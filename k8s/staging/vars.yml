env: staging
project_name: genflow-ad-studio
prefix: staging
namespace: "{{ prefix }}-genflow"
tag: "staging"
context: genflow-staging
domain: "staging.genflow.net"
domain_regex: 'staging\.genflow\.net'
container_identifier: "{{ prefix }}-{{ project_name }}"
revision_history_limit: 3
image_repo: "127603365779.dkr.ecr.ap-south-1.amazonaws.com/genflow-ad-studio"

configs:
  app:
    identifier: "{{ prefix }}-{{ project_name }}"
    fqdn: "{{ prefix }}\\.genflow\\.net"
    liveness_fqdn_header: "{{ prefix }}.genflow.net"
    workload_type: "general"
    min_replicas: 1
    max_replicas: 2
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    hpa:
      cpu_average_utilization: 85
      memory_average_utilization: 85
    env:
      PROJECT_ID: "your-gcp-project-id"
      REGION: "us-central1"
      GCS_BUCKET_NAME: "genflow-staging-output"
      GEMINI_MODEL: "gemini-3-flash-preview"
      GEMINI_FLASH_MODEL: "gemini-3-flash-preview"
      IMAGE_MODEL: "gemini-3-pro-image-preview"
      VEO_MODEL_ID: "veo-3.1-generate-preview"
      VEO_MODELS: '[{"id":"veo-3.1-generate-preview","label":"Veo 3.1 Preview","description":"Standard — Best quality"},{"id":"veo-3.1-fast-generate-preview","label":"Veo 3.1 Fast Preview","description":"Faster generation"}]'
      OUTPUT_DIR: "/app/output"
      STORYBOARD_QC_THRESHOLD: "60"
      VIDEO_QC_THRESHOLD: "6"
      SCRIPT_DEFAULT_SCENE_COUNT: "3"
      MAX_REGEN_ATTEMPTS: "3"
      MAX_VIDEO_VARIANTS: "4"
      MAX_CONCURRENT_SCENES: "3"
    storage:
      size: 10Gi
      storage_class: "standard"
